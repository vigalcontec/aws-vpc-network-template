name: Terraform

on:
  push:
    #branches:
    #  - main
    #  - release/*
    #  - develop
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches:
      - main
      - release/*
      - develop
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - qa
          - prod
      confirm_destroy:
        description: 'Type "DESTROY" to confirm destruction (required for destroy action)'
        required: false
        type: string

env:
  AWS_REGION: eu-west-1
  TF_VERSION: "1.10.0"

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Determine Environment
  # ─────────────────────────────────────────────────────────────────────────────
  set-environment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      action: ${{ steps.set-env.outputs.action }}
    steps:
      - name: Set environment based on branch or input
        id: set-env
        run: |
          # Manual workflow dispatch
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
            echo "action=${{ github.event.inputs.action }}" >> $GITHUB_OUTPUT
          # Push to main = prod
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "action=apply" >> $GITHUB_OUTPUT
          # Push to release/* = qa
          elif [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            echo "environment=qa" >> $GITHUB_OUTPUT
            echo "action=apply" >> $GITHUB_OUTPUT
          # Push to develop = dev
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "action=apply" >> $GITHUB_OUTPUT
          fi

      - name: Validate destroy confirmation
        if: github.event.inputs.action == 'destroy'
        run: |
          if [[ "${{ github.event.inputs.confirm_destroy }}" != "DESTROY" ]]; then
            echo "❌ ERROR: You must type 'DESTROY' to confirm destruction"
            exit 1
          fi
          echo "✅ Destroy confirmed for ${{ github.event.inputs.environment }}"

  # ─────────────────────────────────────────────────────────────────────────────
  # Terraform Format Check
  # ─────────────────────────────────────────────────────────────────────────────
  terraform-fmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: terraform

  # ─────────────────────────────────────────────────────────────────────────────
  # Terraform Plan
  # ─────────────────────────────────────────────────────────────────────────────
  terraform-plan:
    runs-on: ubuntu-latest
    needs: [set-environment, terraform-fmt]
    environment: ${{ needs.set-environment.outputs.environment }}
    env:
      TF_VAR_environment: ${{ needs.set-environment.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=vpc/main/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"
        working-directory: terraform

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
          echo "plan_output<<EOF" >> $GITHUB_OUTPUT
          cat plan_output.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        working-directory: terraform
        continue-on-error: true

      - name: Comment PR with Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan 📖
            
            <details><summary>Show Plan</summary>
            
            \`\`\`terraform
            ${{ steps.plan.outputs.plan_output }}
            \`\`\`
            
            </details>
            
            *Environment: \`${{ needs.set-environment.outputs.environment }}\`*
            *Pushed by: @${{ github.actor }}*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan

      - name: Check Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Terraform Apply
  # ─────────────────────────────────────────────────────────────────────────────
  terraform-apply:
    runs-on: ubuntu-latest
    needs: [set-environment, terraform-plan]
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/release/'))) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    environment: ${{ needs.set-environment.outputs.environment }}
    env:
      TF_VAR_environment: ${{ needs.set-environment.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=vpc/main/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"
        working-directory: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: terraform

  # ─────────────────────────────────────────────────────────────────────────────
  # Terraform Destroy (manual only)
  # ─────────────────────────────────────────────────────────────────────────────
  terraform-destroy:
    runs-on: ubuntu-latest
    needs: [set-environment, terraform-fmt]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    environment: ${{ needs.set-environment.outputs.environment }}
    env:
      TF_VAR_environment: ${{ needs.set-environment.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=vpc/main/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"
        working-directory: terraform

      - name: Terraform Destroy Plan
        run: terraform plan -destroy -no-color -out=tfplan-destroy
        working-directory: terraform

      - name: Terraform Destroy
        run: |
          echo "🔥 DESTROYING infrastructure for ${{ needs.set-environment.outputs.environment }}"
          terraform apply -auto-approve tfplan-destroy
        working-directory: terraform

      - name: Destruction Complete
        run: |
          echo "✅ Infrastructure destroyed for ${{ needs.set-environment.outputs.environment }}"
